<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptech Hero</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      background: #0b0b0b;
      color: #fff;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 5%;
      background: #000;
      position: relative;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .logo span {
      display: block;
      font-size: 12px;
      color: #aaa;
    }

    /* NAV LINKS */
    .nav-links {
      display: flex;
      gap: 20px;
    }

    .nav-links a {
      color: #ddd;
      text-decoration: none;
      font-size: 14px;
    }

    .nav-links a:hover {
      color: #f5a623;
    }

    /* BUTTONS */
    .btn {
      border: none;
      padding: 10px 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
    }

    .enroll {
      background: #f5a623;
      color: #000;
    }

    .primary {
      background: #f5a623;
      color: #000;
      margin-top: 20px;
    }

    /* HAMBURGER */
    .menu-toggle {
      display: none;
      font-size: 26px;
      cursor: pointer;
    }

    /* HERO */
    .hero {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 5%;
      background: radial-gradient(circle at center, #1a1a1a, #000);
    }

    .hero-content {
      max-width: 800px;
    }

    .badge {
      display: inline-block;
      background: #2b1d00;
      color: #f5a623;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 56px;
      font-weight: 800;
      line-height: 1.2;
    }

    .hero p {
      margin-top: 20px;
      color: #bbb;
      font-size: 18px;
    }

    /* MOBILE NAV */
    .mobile-btn {
      display: none;
    }

    .desktop-btn {
      display: block;
    }

    /* RESPONSIVE */
    @media (max-width: 992px) {
      .menu-toggle {
        display: block;
      }

      .nav-links {
        position: absolute;
        top: 70px;
        right: 0;
        background: #000;
        flex-direction: column;
        width: 100%;
        text-align: center;
        display: none;
        padding: 20px 0;
      }

      .nav-links.active {
        display: flex;
      }

      .desktop-btn {
        display: none;
      }

      .mobile-btn {
        display: block;
        margin: 10px auto;
      }

      .hero h1 {
        font-size: 40px;
      }
    }

    @media (max-width: 600px) {
      .hero {
        height: auto;
        padding: 60px 20px;
      }

      .hero h1 {
        font-size: 30px;
      }

      .hero p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">Aptech <span>Computer Education</span></div>

    <!-- Hamburger -->
    <div class="menu-toggle" id="menu-toggle">☰</div>

    <nav class="nav-links" id="nav-links">
      <a href="#">Programs</a>
      <a href="#">Short Courses</a>
      <a href="#">Corporate</a>
      <a href="#">About Us</a>
      <a href="#">Our Team</a>
      <a href="#">Careers</a>
      <button class="btn enroll mobile-btn">Enroll Now</button>
    </nav>

    <button class="btn enroll desktop-btn">Enroll Now</button>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <span class="badge">Best IT Institute in Nigeria</span>

      <h1>
        Where Dreams <br>
        Transform into <br>
        Tech Realities
      </h1>

      <p>
        Choose from a variety of learning formats,
        including in-person classes and online courses.
      </p>

      <button class="btn primary">Get Free Consultation</button>
    </div>
  </section>

  <script>
    const toggle = document.getElementById("menu-toggle");
    const nav = document.getElementById("nav-links");

    toggle.addEventListener("click", () => {
      nav.classList.toggle("active");
    });
  </script>

</body>
</html>
